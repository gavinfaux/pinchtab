services:
  pinchtab:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.pinchtab
    ports:
      - "9999:9999"
    environment:
      - PINCHTAB_PORT=9999
      - PINCHTAB_BIND=0.0.0.0
      - PINCHTAB_HEADLESS=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 10s

  fixtures:
    image: nginx:alpine
    volumes:
      - ./fixtures:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 2s
      timeout: 5s
      retries: 5

  runner:
    build:
      context: ./runner
    depends_on:
      pinchtab:
        condition: service_healthy
      fixtures:
        condition: service_healthy
    environment:
      - PINCHTAB_URL=http://pinchtab:9999
      - FIXTURES_URL=http://fixtures:80
    volumes:
      - ./scenarios:/scenarios:ro
      - ./results:/results
    command: ["/scenarios/run-all.sh"]
